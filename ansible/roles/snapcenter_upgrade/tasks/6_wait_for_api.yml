---
- name: Wait for SnapCenter API to come back online
  ansible.builtin.uri:
    url: "https://localhost:{{ snapcenter_webapp_port }}/api/version"
    method: GET
    validate_certs: false
    status_code: 200
  register: snapcenter_upgrade_api_check
  until: snapcenter_upgrade_api_check is not failed
  retries: "{{ snapcenter_upgrade_api_wait_retries }}"
  delay: "{{ snapcenter_upgrade_api_wait_delay }}"
