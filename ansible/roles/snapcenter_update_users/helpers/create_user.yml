---
- name: "Assign roles to new SnapCenter user: {{ sc_new_user }}"
  ansible.builtin.uri:
    url: "https://localhost:{{ snapcenter_webapp_port }}/api/{{ snapcenter_api_version }}/User?UserNames={{ sc_new_user }}&RoleNames={{ item | urlencode }}"
    method: POST
    headers:
      Token: "{{ snapcenter_update_users_auth_token }}"
      Content-Type: application/json
    validate_certs: false
    status_code: [200]
  loop: "{{ snapcenter_update_users_desired[sc_new_user] }}"
  loop_control:
    label: "{{ sc_new_user }} += {{ item }}"
  register: sc_new_user_result
  failed_when: >-
    sc_new_user_result.json.Result._errorCode | default(-1) != 0
