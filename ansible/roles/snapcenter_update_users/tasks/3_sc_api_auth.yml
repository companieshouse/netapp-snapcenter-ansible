---
- name: Try `admin` authentication with SnapCenter API
  ansible.builtin.uri:
    url: "https://localhost:{{ snapcenter_webapp_port }}/api/auth/login"
    method: POST
    headers:
      Content-Type: application/json
    body_format: json
    body:
      UserOperationContext:
        User:
          Name: admin
          Passphrase: "{{ vault_admin_password }}"
    validate_certs: false
    return_content: true
  register: snapcenter_update_users_admin_auth
  failed_when: false

- name: Set `admin` auth token
  ansible.builtin.set_fact:
    snapcenter_update_users_auth_token: "{{ snapcenter_update_users_admin_auth.json.User.Token }}"
    snapcenter_update_users_authenticated_as: admin
  when:
    - snapcenter_update_users_admin_auth.json.Result._errorCode == 0
    - snapcenter_update_users_admin_auth.json.User.Token is not none

- name: Try `root` authentication with SnapCenter API
  ansible.builtin.uri:
    url: "https://localhost:{{ snapcenter_webapp_port }}/api/auth/login"
    method: POST
    headers:
      Content-Type: application/json
    body_format: json
    body:
      UserOperationContext:
        User:
          Name: root
          Passphrase: "{{ vault_root_password_temp }}"
    validate_certs: false
    return_content: true
  register: snapcenter_update_users_root_auth
  when: snapcenter_update_users_auth_token is not defined
  failed_when: false

- name: Set `root` auth token
  ansible.builtin.set_fact:
    snapcenter_update_users_auth_token: "{{ snapcenter_update_users_root_auth.json.User.Token }}"
    snapcenter_update_users_authenticated_as: root
  when:
    - snapcenter_update_users_auth_token is not defined
    - snapcenter_update_users_root_auth.json.Result._errorCode | default(-1) == 0
    - snapcenter_update_users_root_auth.json.User.Token | default(none) is not none

- name: Fail if neither `admin` nor `root` can authenticate with SnapCenter API
  ansible.builtin.fail:
    msg: >-
      Could not authenticate with SnapCenter API using either `admin` or `root`.
      Admin response: {{ snapcenter_update_users_admin_auth.json.Result._message | default('No response') }}
      Root response: {{ snapcenter_update_users_root_auth.json.Result._message | default('Not attempted or no response') }}
  when: snapcenter_update_users_auth_token is not defined

- name: Show the account used for SnapCenter API authentication
  ansible.builtin.debug:
    msg: "`{{ snapcenter_update_users_authenticated_as }}` successfully authenticated with SnapCenter API"
